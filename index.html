<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Translate</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg: #fafafa;
    --panel: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #8a8a8a;
    --hover: rgba(0, 0, 0, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --panel: #1a1a1a;
      --border: #2c2c2c;
      --text: #f2f2f2;
      --muted: #8a8a8a;
      --hover: rgba(255, 255, 255, 0.08);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 900px;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--muted);
    text-transform: uppercase;
    margin: 0 0 16px 4px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  /* Direction bar */
  .dir-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
  }
  .lang-chip {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    min-width: 64px;
  }
  .lang-chip.source { text-align: right; }
  .lang-chip.target { text-align: left; }
  .flip-btn {
    width: 30px;
    height: 30px;
    flex: none;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: transform 0.2s ease, background 0.15s ease;
  }
  .flip-btn:hover { transform: rotate(180deg); background: var(--hover); }
  /* Body */
  .body {
    display: flex;
    align-items: stretch;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  textarea {
    flex: 1;
    resize: none;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 17px;
    line-height: 1.5;
    padding: 16px;
    min-height: 170px;
    font-family: inherit;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--muted); }
  .divider { width: 1px; background: var(--border); }
  .pane-tools {
    display: flex;
    justify-content: flex-end;
    gap: 2px;
    padding: 6px 8px;
    border-top: 1px solid var(--border);
  }
  .icon-btn {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn.copied { color: #2e9e5b; }
  /* Status */
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
    height: 16px;
  }
  .spinner {
    width: 13px;
    height: 13px;
    border: 2px solid var(--border);
    border-top-color: var(--muted);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .spinner[hidden] { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { font-size: 12px; color: var(--muted); }
  /* Other meanings (dictionary) */
  .meanings {
    margin-top: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .meanings[hidden] { display: none; }
  .meanings-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 11px 16px 4px;
  }
  .pos-group { padding: 8px 16px 10px; }
  .pos-group + .pos-group { border-top: 1px solid var(--border); }
  .pos-label {
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .term-row {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px 8px;
    padding: 3px 0;
  }
  .term {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    border-radius: 5px;
    padding: 0 3px;
    margin: 0 -3px;
    transition: background 0.15s ease;
  }
  .term:hover { background: var(--hover); }
  .gloss { font-size: 12px; color: var(--muted); }
  @media (max-width: 640px) {
    .body { flex-direction: column; }
    .divider { width: auto; height: 1px; }
  }
</style>
</head>
<body>
  <div class="app">
    <h1>Translate</h1>
    <div class="card">
      <div class="dir-bar">
        <span class="lang-chip source" id="sourceChip">English</span>
        <button class="flip-btn" id="flipBtn" title="Reverse direction" aria-label="Reverse direction">⇄</button>
        <span class="lang-chip target" id="targetChip">Spanish</span>
      </div>
      <div class="body">
        <div class="pane">
          <textarea id="fromText" placeholder="Type here…" autofocus></textarea>
          <div class="pane-tools">
            <button class="icon-btn" id="speakInBtn" title="Listen" aria-label="Listen to input">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h2.5L8 3.5v9L4.5 10H2z" fill="currentColor" stroke="none"/><path d="M10.5 5.5a3 3 0 0 1 0 5"/><path d="M12.3 4a5.5 5.5 0 0 1 0 8"/></svg>
            </button>
            <button class="icon-btn" id="clearBtn" title="Clear" aria-label="Clear input">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
            </button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="pane">
          <textarea id="toText" placeholder="Translation" readonly></textarea>
          <div class="pane-tools">
            <button class="icon-btn" id="speakOutBtn" title="Listen" aria-label="Listen to translation">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h2.5L8 3.5v9L4.5 10H2z" fill="currentColor" stroke="none"/><path d="M10.5 5.5a3 3 0 0 1 0 5"/><path d="M12.3 4a5.5 5.5 0 0 1 0 8"/></svg>
            </button>
            <button class="icon-btn" id="copyBtn" title="Copy" aria-label="Copy translation">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M3 10.5V4a1.5 1.5 0 0 1 1.5-1.5H10"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="status-row">
      <div class="spinner" id="spinner" hidden></div>
      <div class="status" id="status"></div>
    </div>
    <div class="meanings" id="meanings" hidden></div>
  </div>

<script>
  const fromText = document.getElementById('fromText');
  const toText = document.getElementById('toText');
  const status = document.getElementById('status');
  const spinner = document.getElementById('spinner');
  const flipBtn = document.getElementById('flipBtn');
  const sourceChip = document.getElementById('sourceChip');
  const targetChip = document.getElementById('targetChip');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');
  const speakInBtn = document.getElementById('speakInBtn');
  const speakOutBtn = document.getElementById('speakOutBtn');
  const meanings = document.getElementById('meanings');

  const LANG_NAMES = { en: 'English', nl: 'Dutch', es: 'Spanish' };
  const SPEECH_LANG = { en: 'en-US', nl: 'nl-NL', es: 'es-US' };

  // ---- Language detection (English / Dutch / Spanish) via common-word overlap ----
  const NL_WORDS = new Set(('de het een en van ik te dat die in hij niet zijn is was op ' +
    'aan met als voor had er maar om hem dan zou of wat mijn men dit zo door over ze zich bij ' +
    'ook tot je mij uit der daar haar naar heb hoe heeft hebben deze want nog zal me zij nu geen ' +
    'omdat iets worden toch al waren veel meer doen toen moet ben zonder kan hun dus alles onder ' +
    'ja eens hier wie werd altijd wordt kunnen ons zelf tegen na wil kon niets uw iemand geweest ' +
    'andere goedemorgen goedemiddag goedenavond dank alsjeblieft alstublieft jij wij gaat goed ' +
    'morgen avond dag waar wanneer waarom jullie graag hallo hoi bedankt tot ziens prettig lekker ' +
    'mooi weer vandaag gisteren misschien natuurlijk welkom vriendelijk groetjes').split(' '));
  const EN_WORDS = new Set(('the be to of and a in that have it for not on with he as you do at ' +
    'this but his by from they we say her she or an will my one all would there their what so up ' +
    'out if about who get which go me when make can like time no just him know take people into ' +
    'year your good some could them see other than then now look only come its over think also ' +
    'back after use two how our work first well way even new want because any these give day most ' +
    'us are was thanks please hello morning evening where why should i am is').split(' '));
  const ES_WORDS = new Set(('el la los las una unos unas que qué de con para por como cómo dónde ' +
    'cuándo cuánto cuál quién porque gracias hola buenos buenas días tardes noches quiero necesito ' +
    'tengo tiene hay muy pero más este esta eso esto usted ustedes nosotros ellos señor señora ' +
    'agua comida favor adiós sí también ahora aquí allí mañana hoy ayer bien mal hombre mujer ' +
    'casa calle tienda es está están estoy soy eres puedo puede vamos hacer').split(' '));

  function detectLang(text) {
    const lower = text.toLowerCase();
    const tokens = lower.match(/[a-zà-ÿñ]+/g) || [];
    const score = { nl: 0, en: 0, es: 0 };
    for (const t of tokens) {
      if (NL_WORDS.has(t)) score.nl++;
      if (EN_WORDS.has(t)) score.en++;
      if (ES_WORDS.has(t)) score.es++;
    }
    // Spanish has unmistakable punctuation/letters.
    if (/[ñ¿¡]/.test(text)) score.es += 3;
    if (/[áéíóú]/.test(lower)) score.es += 1;
    // Characteristic Dutch spelling patterns.
    if (/ij|sch|\w+tje\b|\w+heid\b/.test(lower)) score.nl += 0.5;
    // Argmax; on ties prefer the more strongly-marked languages (es, then nl).
    let best = 'en', bestScore = -1;
    for (const lang of ['es', 'nl', 'en']) {
      if (score[lang] > bestScore) { bestScore = score[lang]; best = lang; }
    }
    return bestScore > 0 ? best : 'en';
  }

  // ---- State ----
  let debounceTimer = null;
  let spinnerTimer = null;
  let requestId = 0;
  let currentSrc = 'en';
  let currentTgt = 'es';

  function renderBar(src, tgt) {
    currentSrc = src;
    currentTgt = tgt;
    sourceChip.textContent = LANG_NAMES[src] || (src || '').toUpperCase();
    targetChip.textContent = LANG_NAMES[tgt] || (tgt || '').toUpperCase();
  }

  const apiCode = (lang) => (lang === 'es' ? 'es-419' : lang); // Latin American Spanish
  const norm = (t) => t.trim().toLowerCase();
  const isNoop = (a, b) => norm(a) === norm(b);
  // Google frequently tags bare Dutch words as Afrikaans; treat as Dutch here.
  const normSrc = (code) => (code === 'af' ? 'nl' : code);

  async function callGoogle(sl, tl, text) {
    // dt=t = translation, dt=bd = dictionary (alternative meanings by part of speech).
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${apiCode(tl)}&dt=t&dt=bd&hl=en&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('bad status');
    const data = await res.json();
    if (!Array.isArray(data[0])) throw new Error('bad payload');
    return { data, text: data[0].map((chunk) => chunk[0]).join('') };
  }

  // Show the dictionary block (alternative meanings by part of speech) when Google
  // returns one — it only does for single words / short phrases, exactly where a
  // one-shot translation hides ambiguity (e.g. "right" -> bien / derecha / derecho).
  function renderMeanings(bd) {
    meanings.innerHTML = '';
    if (!Array.isArray(bd) || !bd.length) { meanings.hidden = true; return; }

    const title = document.createElement('div');
    title.className = 'meanings-title';
    title.textContent = 'Other meanings';
    meanings.appendChild(title);

    let groupsShown = 0;
    for (const group of bd) {
      const pos = group[0];
      const entries = Array.isArray(group[2]) ? group[2] : [];
      if (!entries.length) continue;

      const groupEl = document.createElement('div');
      groupEl.className = 'pos-group';
      if (pos) {
        const label = document.createElement('div');
        label.className = 'pos-label';
        label.textContent = pos;
        groupEl.appendChild(label);
      }
      for (const entry of entries.slice(0, 4)) {
        const term = entry[0];
        const reverse = Array.isArray(entry[1]) ? entry[1].slice(0, 4).join(', ') : '';
        const row = document.createElement('div');
        row.className = 'term-row';

        const termEl = document.createElement('span');
        termEl.className = 'term';
        termEl.textContent = term;
        termEl.title = 'Use this translation';
        termEl.addEventListener('click', () => { toText.value = term; });
        row.appendChild(termEl);

        if (reverse) {
          const glossEl = document.createElement('span');
          glossEl.className = 'gloss';
          glossEl.textContent = reverse;
          row.appendChild(glossEl);
        }
        groupEl.appendChild(row);
      }
      meanings.appendChild(groupEl);
      if (++groupsShown >= 4) break;
    }
    meanings.hidden = groupsShown === 0;
  }

  function scheduleSpinner(id) {
    clearTimeout(spinnerTimer);
    spinner.hidden = true;
    spinnerTimer = setTimeout(() => {
      if (id === requestId) spinner.hidden = false;
    }, 250);
  }

  function hideSpinner() {
    clearTimeout(spinnerTimer);
    spinner.hidden = true;
  }

  async function translateWithMyMemory(text, src, tgt) {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data && data.responseData && data.responseData.translatedText) {
      return data.responseData.translatedText;
    }
    throw new Error('MyMemory translation failed');
  }

  async function translate() {
    const text = fromText.value.trim();
    if (!text) {
      toText.value = '';
      renderMeanings(null);
      hideSpinner();
      status.textContent = '';
      return;
    }

    // Fast local guess only picks which direction to *probe* first (saves a call);
    // the real direction comes from Google's auto-detect + a no-op safety check.
    const guess = detectLang(text);
    const firstTgt = guess === 'es' ? 'en' : 'es';
    const myRequest = ++requestId;
    scheduleSpinner(myRequest);

    try {
      let result = await callGoogle('auto', firstTgt, text);
      if (myRequest !== requestId) return; // stale response
      let tgt = firstTgt;

      // A no-op means auto-detect refused to translate — almost always a bare
      // Spanish word it wrongly reads as English (e.g. "gato", "casa"). Force it to
      // be treated as Spanish and translate to English; keep only if that helps.
      if (isNoop(result.text, text)) {
        const forced = await callGoogle('es', 'en', text);
        if (myRequest !== requestId) return;
        if (!isNoop(forced.text, text)) {
          result = forced;
          tgt = 'en';
        }
      }

      // This app only ever produces English from Spanish; everything else -> Spanish.
      let src;
      if (tgt === 'en') {
        src = 'es';
      } else {
        const detected = normSrc(result.data[2]);
        src = detected === 'nl' || detected === 'en' ? detected : (guess === 'nl' ? 'nl' : 'en');
      }

      renderBar(src, tgt);
      toText.value = result.text;
      renderMeanings(result.data[1]);
      hideSpinner();
      status.textContent = '';
    } catch (err) {
      if (myRequest !== requestId) return;
      renderMeanings(null);

      // Fallback to MyMemory using the local guess for direction.
      const src = guess;
      const tgt = guess === 'es' ? 'en' : 'es';
      renderBar(src, tgt);
      try {
        const translated = await translateWithMyMemory(text, src, apiCode(tgt));
        if (myRequest !== requestId) return;
        toText.value = translated;
        hideSpinner();
        status.textContent = '';
        return;
      } catch (fallbackErr) {
        // fall through to error state below
      }

      if (myRequest !== requestId) return;
      hideSpinner();
      status.textContent = 'Translation unavailable — check your connection';
    }
  }

  function scheduleTranslate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(translate, 180);
  }

  fromText.addEventListener('input', scheduleTranslate);

  flipBtn.addEventListener('click', () => {
    // Send the translation back through as the new input; direction re-detects itself.
    if (!toText.value) return;
    fromText.value = toText.value;
    toText.value = '';
    fromText.focus();
    translate();
  });

  clearBtn.addEventListener('click', () => {
    fromText.value = '';
    toText.value = '';
    status.textContent = '';
    renderMeanings(null);
    hideSpinner();
    fromText.focus();
  });

  copyBtn.addEventListener('click', async () => {
    if (!toText.value) return;
    try {
      await navigator.clipboard.writeText(toText.value);
    } catch (err) {
      toText.select();
      document.execCommand('copy');
      toText.setSelectionRange(0, 0);
    }
    copyBtn.classList.add('copied');
    setTimeout(() => copyBtn.classList.remove('copied'), 1200);
  });

  function speak(text, langCode) {
    if (!text || !('speechSynthesis' in window)) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = SPEECH_LANG[langCode] || 'en-US';
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  }

  speakInBtn.addEventListener('click', () => speak(fromText.value, currentSrc));
  speakOutBtn.addEventListener('click', () => speak(toText.value, currentTgt));

  // Resting state before any typing.
  renderBar(currentSrc, currentTgt);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
