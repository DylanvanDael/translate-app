<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translate</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg: #fafafa;
    --panel: #ffffff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --muted: #8a8a8a;
    --accent: #1a1a1a;
    --hover: rgba(0, 0, 0, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --panel: #1a1a1a;
      --border: #2c2c2c;
      --text: #f2f2f2;
      --muted: #8a8a8a;
      --accent: #f2f2f2;
      --hover: rgba(255, 255, 255, 0.08);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 900px;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--muted);
    text-transform: uppercase;
    margin: 0 0 16px 4px;
  }
  .card {
    display: flex;
    align-items: stretch;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px 6px 14px;
    border-bottom: 1px solid var(--border);
  }
  .detected {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    padding: 4px 2px;
  }
  select {
    appearance: none;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 4px 2px;
    cursor: pointer;
  }
  select:focus { outline: none; }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .icon-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn.copied { color: #2e9e5b; }
  textarea {
    flex: 1;
    resize: none;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 17px;
    line-height: 1.5;
    padding: 16px;
    min-height: 180px;
    font-family: inherit;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--muted); }
  .divider {
    width: 1px;
    background: var(--border);
  }
  .swap-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 0;
    position: relative;
  }
  .swap {
    position: absolute;
    left: -18px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    font-size: 16px;
    transition: transform 0.15s ease;
  }
  .swap:hover { transform: translateY(-50%) rotate(180deg); }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
    height: 16px;
  }
  .spinner {
    width: 13px;
    height: 13px;
    border: 2px solid var(--border);
    border-top-color: var(--muted);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .spinner[hidden] { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    font-size: 12px;
    color: var(--muted);
  }
  @media (max-width: 640px) {
    .card { flex-direction: column; }
    .divider { width: auto; height: 1px; }
    .swap-wrap { width: auto; height: 0; }
    .swap { left: 50%; top: -18px; transform: translateX(-50%); }
    .swap:hover { transform: translateX(-50%) rotate(180deg); }
  }
</style>
</head>
<body>
  <div class="app">
    <h1>Translate</h1>
    <div class="card">
      <div class="pane">
        <div class="pane-header">
          <span class="detected" id="detectedLabel">Auto</span>
          <div class="header-actions">
            <button class="icon-btn" id="speakInBtn" title="Listen" aria-label="Listen to input">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h2.5L8 3.5v9L4.5 10H2z" fill="currentColor" stroke="none"/><path d="M10.5 5.5a3 3 0 0 1 0 5"/><path d="M12.3 4a5.5 5.5 0 0 1 0 8"/></svg>
            </button>
            <button class="icon-btn" id="clearBtn" title="Clear" aria-label="Clear input">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
            </button>
          </div>
        </div>
        <textarea id="fromText" placeholder="Type here…" autofocus></textarea>
      </div>

      <div class="divider"></div>
      <div class="swap-wrap"><button class="swap" id="swapBtn" title="Swap languages">⇄</button></div>
      <div class="divider"></div>

      <div class="pane">
        <div class="pane-header">
          <select id="toLang">
            <option value="es">Spanish</option>
            <option value="en">English</option>
            <option value="nl">Dutch</option>
          </select>
          <div class="header-actions">
            <button class="icon-btn" id="speakOutBtn" title="Listen" aria-label="Listen to translation">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h2.5L8 3.5v9L4.5 10H2z" fill="currentColor" stroke="none"/><path d="M10.5 5.5a3 3 0 0 1 0 5"/><path d="M12.3 4a5.5 5.5 0 0 1 0 8"/></svg>
            </button>
            <button class="icon-btn" id="copyBtn" title="Copy" aria-label="Copy translation">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M3 10.5V4a1.5 1.5 0 0 1 1.5-1.5H10"/></svg>
            </button>
          </div>
        </div>
        <textarea id="toText" placeholder="Translation" readonly></textarea>
      </div>
    </div>
    <div class="status-row">
      <div class="spinner" id="spinner" hidden></div>
      <div class="status" id="status"></div>
    </div>
  </div>

<script>
  const toLang = document.getElementById('toLang');
  const fromText = document.getElementById('fromText');
  const toText = document.getElementById('toText');
  const status = document.getElementById('status');
  const spinner = document.getElementById('spinner');
  const swapBtn = document.getElementById('swapBtn');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');
  const speakInBtn = document.getElementById('speakInBtn');
  const speakOutBtn = document.getElementById('speakOutBtn');
  const detectedLabel = document.getElementById('detectedLabel');

  const LANG_NAMES = { en: 'English', nl: 'Dutch', es: 'Spanish' };
  const SPEECH_LANG = { en: 'en-US', nl: 'nl-NL', es: 'es-US' };

  // Source detection is deliberately limited to Dutch vs. English (the only two
  // input languages when translating into Spanish). Scored by common-word overlap.
  const NL_WORDS = new Set(('de het een en van ik te dat die in hij niet zijn is was op ' +
    'aan met als voor had er maar om hem dan zou of wat mijn men dit zo door over ze zich bij ' +
    'ook tot je mij uit der daar haar naar heb hoe heeft hebben deze want nog zal me zij nu geen ' +
    'omdat iets worden toch al waren veel meer doen toen moet ben zonder kan hun dus alles onder ' +
    'ja eens hier wie werd altijd wordt kunnen ons zelf tegen na wil kon niets uw iemand geweest ' +
    'andere goedemorgen goedemiddag goedenavond dank alsjeblieft alstublieft jij wij gaat goed ' +
    'morgen avond dag waar wanneer waarom jullie graag hallo hoi bedankt tot ziens prettig lekker ' +
    'mooi weer vandaag gisteren misschien natuurlijk welkom vriendelijk groetjes').split(' '));
  const EN_WORDS = new Set(('the be to of and a in that have it for not on with he as you do at ' +
    'this but his by from they we say her she or an will my one all would there their what so up ' +
    'out if about who get which go me when make can like time no just him know take people into ' +
    'year your good some could them see other than then now look only come its over think also ' +
    'back after use two how our work first well way even new want because any these give day most ' +
    'us are was thanks please hello morning evening where when why would could should i am is').split(' '));

  function detectNlEn(text) {
    const tokens = (text.toLowerCase().match(/[a-zà-ÿ]+/g)) || [];
    let nl = 0, en = 0;
    for (const t of tokens) {
      if (NL_WORDS.has(t)) nl++;
      if (EN_WORDS.has(t)) en++;
    }
    if (nl !== en) return nl > en ? 'nl' : 'en';
    // Tie-break on characteristic Dutch spelling patterns.
    return /ij|sch|aa|ee|oo|uu|\w+tje|\w+heid|\w+en\b/.test(text.toLowerCase()) ? 'nl' : 'en';
  }

  let debounceTimer = null;
  let spinnerTimer = null;
  let requestId = 0;
  let lastDetected = null;

  function updateDetectedLabel(code) {
    if (!code) { detectedLabel.textContent = 'Auto'; return; }
    detectedLabel.textContent = LANG_NAMES[code] || code.toUpperCase();
  }

  function scheduleSpinner(id) {
    clearTimeout(spinnerTimer);
    spinner.hidden = true;
    spinnerTimer = setTimeout(() => {
      if (id === requestId) spinner.hidden = false;
    }, 250);
  }

  function hideSpinner() {
    clearTimeout(spinnerTimer);
    spinner.hidden = true;
  }

  async function translateWithMyMemory(text, src, tgt) {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data && data.responseData && data.responseData.translatedText) {
      return data.responseData.translatedText;
    }
    throw new Error('MyMemory translation failed');
  }

  async function translate() {
    const text = fromText.value.trim();
    if (!text) {
      toText.value = '';
      hideSpinner();
      status.textContent = '';
      return;
    }

    const tgt = toLang.value;
    // Translating INTO Spanish, the input is Dutch or English (detected between just
    // those two). Translating OUT of Spanish (target English/Dutch), the input is Spanish.
    const src = tgt === 'es' ? detectNlEn(text) : 'es';
    // es-419 = Latin American Spanish (vs. es-ES for Spain)
    const apiTgt = tgt === 'es' ? 'es-419' : tgt;
    lastDetected = src;
    updateDetectedLabel(src);

    const myRequest = ++requestId;
    scheduleSpinner(myRequest);

    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${apiTgt}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('bad status');
      const data = await res.json();
      if (myRequest !== requestId) return; // stale response
      if (!Array.isArray(data[0])) throw new Error('bad payload');

      toText.value = data[0].map(chunk => chunk[0]).join('');
      hideSpinner();
      status.textContent = '';
    } catch (err) {
      if (myRequest !== requestId) return;

      // Fallback to MyMemory using the same constrained source language.
      try {
        const translated = await translateWithMyMemory(text, src, apiTgt);
        if (myRequest !== requestId) return;
        toText.value = translated;
        hideSpinner();
        status.textContent = '';
        return;
      } catch (fallbackErr) {
        // fall through to error state below
      }

      if (myRequest !== requestId) return;
      hideSpinner();
      status.textContent = 'Translation unavailable — check your connection';
    }
  }

  function scheduleTranslate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(translate, 180);
  }

  fromText.addEventListener('input', scheduleTranslate);
  toLang.addEventListener('change', scheduleTranslate);

  swapBtn.addEventListener('click', () => {
    // Send the output back through as input, translating toward the language we came from.
    const newTarget = lastDetected && LANG_NAMES[lastDetected] ? lastDetected : toLang.value;
    fromText.value = toText.value;
    toText.value = '';
    toLang.value = newTarget;
    lastDetected = null;
    updateDetectedLabel(null);
    scheduleTranslate();
  });

  clearBtn.addEventListener('click', () => {
    fromText.value = '';
    toText.value = '';
    status.textContent = '';
    hideSpinner();
    lastDetected = null;
    updateDetectedLabel(null);
    fromText.focus();
  });

  copyBtn.addEventListener('click', async () => {
    if (!toText.value) return;
    try {
      await navigator.clipboard.writeText(toText.value);
    } catch (err) {
      toText.select();
      document.execCommand('copy');
      toText.setSelectionRange(0, 0);
    }
    copyBtn.classList.add('copied');
    setTimeout(() => copyBtn.classList.remove('copied'), 1200);
  });

  function speak(text, langCode) {
    if (!text || !('speechSynthesis' in window)) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = SPEECH_LANG[langCode] || 'en-US';
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  }

  speakInBtn.addEventListener('click', () => {
    speak(fromText.value, lastDetected || 'en');
  });

  speakOutBtn.addEventListener('click', () => {
    speak(toText.value, toLang.value);
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
